name: Deploy to Cafe24 (skin1)

# 배포 대상: src/ (스킨 코드) -> Cafe24 prod 스킨 /skin1
#
# [배포 모드]
#   incremental : 바뀐 파일만 올린다. git diff(내용 해시)로 변경분을 뽑아 그것만 put.
#                 평소 배포는 전부 이것. 몇 초면 끝나고 라이브 영향이 최소다.
#   full        : src/ 전체를 다시 올린다(lftp mirror). 느리고 파일마다 remove→put 이라
#                 라이브에 순간 404 창이 생긴다. 베이스라인 최초 1회 / 서버가 git 과
#                 어긋난 것 같을 때 재동기화 / 복구용으로만 쓴다.
#
# [트리거]
#   main 에 src/ 변경 push  ->  incremental 로 자동 배포 (실제 업로드)
#   수동 실행(Run workflow) ->  mode / base_sha / dry_run 을 골라서 실행
#
# 참고: push 로 돌다 실패한 건 그 run 의 "Re-run jobs" 로 재실행하는 게 정석이다.
#       (원래 이벤트의 직전 커밋 정보가 유지되어 증분이 그대로 재현됨)
#
# 주의: 어떤 모드도 서버 파일을 삭제하지 않는다(--delete 미사용). git 에서 지운 파일은
#       서버에 남으며, 그 사실을 warning 으로 알려준다.
#
# 함정: Cafe24 SFTP 는 chmod 를 허용하지 않는다(관리형 호스팅). lftp mirror 는 기본적으로
#       전송 후 권한을 로컬과 맞추려 chmod 를 시도하는데, 서버가 이를 거부해
#       "chmod: Access failed: permission denied" 후 exit 1 로 죽는다.
#       파일 전송 자체는 전부 성공했는데도 배포가 '실패'로 표시되는 거짓 실패였다.
#       -> mirror 에 --no-perms 를 주어 권한 설정 시도 자체를 하지 않는다.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental = 바뀐 파일만 올림(평소 배포) / full = src 전체를 다시 올림(베이스라인·재동기화·복구용)'
        type: choice
        options:
          - incremental
          - full
        default: incremental
      base_sha:
        description: '[incremental 전용] 이 커밋 이후 바뀐 파일을 올림. 비워두면 직전 커밋(HEAD~1) 기준. full 이면 무시됨'
        required: false
        type: string
      dry_run:
        description: '체크하면 실제 업로드 없이 "무엇을 올릴지" 목록만 출력 (안전 미리보기)'
        type: boolean
        default: true

# 배포가 겹치지 않게 직렬화
concurrency:
  group: deploy-cafe24-skin1
  cancel-in-progress: false

env:
  LOCAL_DIR: src
  REMOTE_DIR: /skin1

jobs:
  deploy:
    name: SFTP deploy src/ -> /skin1
    runs-on: ubuntu-latest
    # prod 성역 강제: production 환경의 secrets/보호규칙(main 브랜치 한정)을 통과해야 배포됨
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git diff 가 이전 커밋에 접근하려면 전체 히스토리가 필요 (기본은 shallow)
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 배포 계획 수립 (증분/전량 결정)
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          IN_MODE: ${{ github.event.inputs.mode }}
          IN_BASE: ${{ github.event.inputs.base_sha }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : > changed.txt

          use_full() {
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "::notice::[전량] src/ 전체를 /skin1 로 동기화합니다."
          }

          # 1) 수동 + full 이면 전량
          if [ "$EVENT" = "workflow_dispatch" ] && [ "${IN_MODE:-}" = "full" ]; then
            use_full
            exit 0
          fi

          # 2) 증분 기준 커밋 결정
          if [ "$EVENT" = "push" ]; then
            BASE="${BEFORE:-}"                       # push 직전 커밋
          else
            BASE="${IN_BASE:-}"                      # 수동 입력값
            [ -z "$BASE" ] && BASE="$(git rev-parse HEAD~1)"
          fi

          # 3) 기준 커밋이 없거나(신규 브랜치/force-push) 유효하지 않으면 전량으로 폴백
          if [ -z "$BASE" ] \
             || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "::warning::기준 커밋(${BASE:-none})을 찾을 수 없어 전량 동기화로 폴백합니다."
            use_full
            exit 0
          fi

          # 4) 추가/수정/이름변경된 파일만 (삭제 D 는 제외 — 서버 파일은 지우지 않음)
          git diff --name-only --diff-filter=ACMR "$BASE" "$SHA" -- "$LOCAL_DIR/" > changed.txt || true
          COUNT=$(wc -l < changed.txt | tr -d ' ')

          # 5) git 에서 삭제된 파일은 서버에 그대로 남는다 — 조용히 넘어가지 않고 알린다
          git diff --name-only --diff-filter=D "$BASE" "$SHA" -- "$LOCAL_DIR/" > deleted.txt || true
          if [ -s deleted.txt ]; then
            echo "::warning::git 에서 삭제된 아래 파일은 서버(/skin1)에 그대로 남습니다. 필요하면 수동 정리하세요."
            sed 's/^/  (서버에 잔존) /' deleted.txt
          fi

          echo "mode=incremental" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::[증분] 기준=${BASE} · 업로드 대상 ${COUNT}개"
          if [ "$COUNT" -gt 0 ]; then
            sed 's/^/  /' changed.txt
          else
            echo "  (변경된 src/ 파일 없음 — 업로드할 것 없음)"
          fi

      - name: Deploy via SFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          MODE: ${{ steps.plan.outputs.mode }}
          COUNT: ${{ steps.plan.outputs.count }}
          # push 이벤트에서는 비어있음 -> 실제 배포
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DRY="${DRY_RUN:-}"

          # --- 증분 ---------------------------------------------------------
          if [ "$MODE" = "incremental" ]; then
            if [ "${COUNT:-0}" -eq 0 ]; then
              echo "업로드할 파일이 없습니다. 종료."
              exit 0
            fi
            if [ "$DRY" = "true" ]; then
              echo "::notice::DRY-RUN — 아래 ${COUNT}개를 업로드할 예정입니다 (실제 업로드 안 함)."
              sed 's/^/  would upload: /' changed.txt
              exit 0
            fi
            # 비밀번호가 argv/파일에 남지 않도록 lftp stdin 으로 명령을 흘려보냄
            {
              echo "set sftp:auto-confirm yes"
              echo "set net:timeout 20"
              echo "set net:max-retries 3"
              echo "open sftp://${FTP_HOST}:${FTP_PORT}"
              echo "user \"${FTP_USER}\" \"${FTP_PASS}\""
              while IFS= read -r f; do
                [ -n "$f" ] || continue
                rel="${f#${LOCAL_DIR}/}"
                dir="$(dirname "$rel")"
                if [ "$dir" = "." ]; then
                  echo "put -O \"${REMOTE_DIR}\" \"$f\""
                else
                  echo "mkdir -p -f \"${REMOTE_DIR}/${dir}\""
                  echo "put -O \"${REMOTE_DIR}/${dir}\" \"$f\""
                fi
              done < changed.txt
              echo "bye"
            } | lftp
            echo "✅ 증분 배포 완료 (${COUNT}개)"
            exit 0
          fi

          # --- 전량 ---------------------------------------------------------
          MIRROR_DRY=""
          if [ "$DRY" = "true" ]; then
            MIRROR_DRY="--dry-run"
            echo "::notice::DRY-RUN — 실제 업로드 없이 계획만 출력합니다."
          fi
          lftp <<LFTP
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open sftp://${FTP_HOST}:${FTP_PORT}
          user "${FTP_USER}" "${FTP_PASS}"
          mirror --reverse --verbose --no-perms ${MIRROR_DRY} \
            --exclude 'order/ec_orderform' \
            --exclude-glob '.DS_Store' \
            ${LOCAL_DIR}/ ${REMOTE_DIR}/
          bye
          LFTP
